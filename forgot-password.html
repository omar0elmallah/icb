<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password — SocialSphere</title>
<meta name="description" content="Reset your SocialSphere password." />

<script>
  (function () {
    var stored = localStorage.getItem("socialsphere-theme");
    var theme = stored || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-reboot.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="assets/css/design-system.css">
<link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

<div class="auth-shell">

  <button class="theme-toggle theme-toggle-float" id="themeToggle" aria-label="Toggle dark and light mode" type="button">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
  </button>

  <section class="auth-stage">
    <div class="aurora-blob b1"></div>
    <div class="aurora-blob b2"></div>
    <div class="aurora-blob b3"></div>

    <div class="brand-lockup">
      <div class="orbit-mark"><div class="ring"><div class="satellite"></div></div><div class="core"></div></div>
      SocialSphere
    </div>

    <div class="auth-stage-copy">
      <span class="eyebrow">Account recovery</span>
      <h1>Locked out happens. Let's fix it.</h1>
      <p>Tell us the email on your account and we'll send a link to set a new password.</p>
    </div>

    <div></div>
  </section>

  <section class="auth-panel">
    <div class="auth-card">
      <h2>Reset your password</h2>
      <p class="subtitle">We'll email you a secure link.</p>

      <div class="alert alert-error" id="resetAlert" role="alert"></div>

      <form id="resetForm" novalidate>
        <div class="field" id="resetEmailField">
          <input type="email" id="resetEmail" placeholder=" " autocomplete="email" required />
          <label for="resetEmail">Email address</label>
          <div class="field-error">Enter a valid email address.</div>
        </div>

        <button class="btn btn-primary btn-block" type="submit" id="resetSubmitBtn">
          <span class="btn-label">Send reset link</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
      </form>

      <div class="auth-footer">
        Remembered it after all? <a href="login.html">Back to log in</a>
      </div>
    </div>
  </section>

</div>

<script type="module">
  import { initThemeToggle } from "./assets/js/theme.js";
  import { wireForgotPasswordForm } from "./assets/js/auth.js";
  import { redirectIfAuthenticated } from "./assets/js/protected-route.js";

  initThemeToggle(document.getElementById("themeToggle"));

  wireForgotPasswordForm({
    form: document.getElementById("resetForm"),
    alertEl: document.getElementById("resetAlert"),
    submitBtn: document.getElementById("resetSubmitBtn"),
    fields: {
      email: document.getElementById("resetEmailField"),
    },
  });

  redirectIfAuthenticated();
</script>

</body>
</html>
