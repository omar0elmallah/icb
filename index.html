<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SocialSphere</title>
<meta name="description" content="Your SocialSphere home." />

<script>
  (function () {
    var stored = localStorage.getItem("socialsphere-theme");
    var theme = stored || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="assets/css/design-system.css">
<style>
  body { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-bottom: 1px solid var(--surface-border);
    background: var(--bg-elevated);
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent-gradient); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 700; font-size: 14px;
  }
  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: var(--space-6);
  }
  .welcome-card { max-width: 520px; text-align: center; padding: var(--space-7); }
  .welcome-card .orbit-mark { margin: 0 auto var(--space-5); }
  .welcome-card h1 { font-size: 26px; margin-bottom: var(--space-3); }
  .welcome-card p { color: var(--text-muted); margin-bottom: var(--space-6); }
  .phase-note {
    margin-top: var(--space-6); padding: 14px 18px; border-radius: var(--radius-sm);
    background: var(--surface); font-size: 13px; color: var(--text-muted); text-align: left;
  }
  .loading-gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 10px; color: var(--text-muted); }
</style>
</head>
<body>

<div id="loadingGate" class="loading-gate">
  <div class="skeleton" style="width:20px;height:20px;border-radius:50%;"></div>
  Checking your session…
</div>

<div id="app" style="display:none;">
  <header class="topbar">
    <div class="brand-lockup">
      <div class="orbit-mark"><div class="ring"><div class="satellite"></div></div><div class="core"></div></div>
      SocialSphere
    </div>
    <div class="topbar-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark and light mode" type="button">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
      </button>
      <div class="avatar" id="userAvatar">–</div>
      <button class="btn btn-ghost" id="logoutBtn" type="button">
        <i class="fa-solid fa-arrow-right-from-bracket" aria-hidden="true"></i>
        Log out
      </button>
    </div>
  </header>

  <main>
    <div class="welcome-card glass">
      <div class="orbit-mark"><div class="ring"><div class="satellite"></div></div><div class="core"></div></div>
      <h1>Welcome, <span id="userName">there</span>.</h1>
      <p id="userMeta">You're signed in and your session is protected.</p>

      <div class="phase-note">
        <strong>Phase 1 complete:</strong> authentication, session persistence, protected
        routing, and the design system are live. The feed, profiles, messaging, and the
        rest of the app arrive in the next build phase.
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { initThemeToggle } from "./assets/js/theme.js";
  import { protectPage } from "./assets/js/protected-route.js";
  import { logout } from "./assets/js/auth.js";

  initThemeToggle(document.getElementById("themeToggle"));

  const user = await protectPage();

  document.getElementById("loadingGate").style.display = "none";
  document.getElementById("app").style.display = "block";

  const name = user.displayName || (user.email ? user.email.split("@")[0] : "there");
  document.getElementById("userName").textContent = name;
  document.getElementById("userMeta").textContent = `Signed in as ${user.email}`;
  document.getElementById("userAvatar").textContent = name.slice(0, 1).toUpperCase();

  document.getElementById("logoutBtn").addEventListener("click", logout);
</script>

</body>
</html>
